apiVersion: apps/v1
kind: Deployment
metadata:
  name: inferenceforge-gateway
  labels:
    app: inferenceforge-gateway
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inferenceforge-gateway
  template:
    metadata:
      labels:
        app: inferenceforge-gateway
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: inferenceforge-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: inferenceforge-config
                  key: model_backend_url
            - name: MODEL_NAME
              valueFrom:
                configMapKeyRef:
                  name: inferenceforge-config
                  key: model_name
            - name: BACKEND_TYPE
              valueFrom:
                configMapKeyRef:
                  name: inferenceforge-config
                  key: backend_type
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inferenceforge-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inferenceforge-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Scale on CPU as a baseline
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on queue depth via custom metric (requires prometheus-adapter)
    - type: Pods
      pods:
        metric:
          name: inferenceforge_queue_depth
        target:
          type: AverageValue
          averageValue: "10"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300

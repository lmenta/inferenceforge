apiVersion: v1
kind: Service
metadata:
  name: inferenceforge-gateway
  labels:
    app: inferenceforge-gateway
spec:
  selector:
    app: inferenceforge-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: inferenceforge-gateway-headless
spec:
  selector:
    app: inferenceforge-gateway
  clusterIP: None
  ports:
    - port: 8080

{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inferenceforge-gateway-hpa
  labels:
    app.kubernetes.io/name: inferenceforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inferenceforge-gateway
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.cpuThreshold }}
    - type: Pods
      pods:
        metric:
          name: inferenceforge_queue_depth
        target:
          type: AverageValue
          averageValue: "{{ .Values.autoscaling.queueDepthThreshold }}"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
{{- end }}
